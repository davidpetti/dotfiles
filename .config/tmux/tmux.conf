set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

# enable mouse
set -g mouse on

# index from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on 

# window navigation with vim binds
bind -n M-H previous-window
bind -n M-L next-window

# set leader bind
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible tmux bindings
set -g @plugin 'tmux-plugins/tmux-sensible'

# Vim style pane navigation and neovim integration
set -g @plugin 'christoomey/vim-tmux-navigator'

# Save/Restore sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh node npm yarn make cargo'

# Automatically saves env state
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @continuum-boot 'on'

# Bottom bar plugins
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'

# Better session searching with sesh
bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 90%,90% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Copy to sys clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# v/h-split bindings
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# popups
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

bind-key p if-shell "tmux list-clients -F '#{client_name}' | grep -q '^popup$'" \
    "tmux detach-client -t popup" \
    "tmux display-popup -E -w 80% -h 80% -d '#{pane_current_path}' -c popup"

# start tmux package manager
run '~/.tmux/plugins/tpm/tpm'
